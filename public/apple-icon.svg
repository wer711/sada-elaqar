<svg viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D7C66"/>
      <stop offset="1" stop-color="#0a6b58"/>
    </linearGradient>
  </defs>
  <!-- No rounded corners for Apple (iOS adds them automatically) -->
  <rect width="180" height="180" fill="url(#bg)"/>

  <!-- Building (centered, larger) -->
  <rect x="48" y="56" width="84" height="90" rx="6" fill="#FBF8F2"/>

  <!-- Windows top row -->
  <rect x="62" y="72" width="18" height="18" rx="2" fill="#0D7C66"/>
  <rect x="100" y="72" width="18" height="18" rx="2" fill="#0D7C66"/>

  <!-- Windows bottom row -->
  <rect x="62" y="104" width="18" height="18" rx="2" fill="#0D7C66"/>

  <!-- Door (gold) -->
  <rect x="100" y="104" width="18" height="42" rx="3" fill="#D4A853"/>

  <!-- Echo waves (two, bold) -->
  <path d="M148 45 C157 54, 157 69, 148 78" stroke="#D4A853" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M158 32 C172 46, 172 77, 158 91" stroke="#D4A853" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>
